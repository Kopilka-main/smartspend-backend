{% extends "layout.html" %}
{% block content %}
<div class="card">
  <div class="card-header">
    <h3 class="card-title">Импорт из Excel</h3>
  </div>
  <div class="card-body">
    <form id="import-form" enctype="multipart/form-data">
      <div class="mb-3">
        <label class="form-label">Сущность</label>
        <select name="entity" class="form-select" required>
          <option value="cards">Карты</option>
          <option value="deposits">Вклады</option>
          <option value="companies">Компании</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Файл .xlsx</label>
        <input type="file" name="file" class="form-control" accept=".xlsx" required>
        <div class="form-text">
          Шаблоны:
          <a href="/api/static/templates/cards.xlsx">Карты</a> |
          <a href="/api/static/templates/deposits.xlsx">Вклады</a> |
          <a href="/api/static/templates/companies.xlsx">Компании</a>
        </div>
      </div>
      <button type="submit" class="btn btn-primary">Загрузить</button>
    </form>
    <div id="result" class="mt-4"></div>

    <div class="mt-4">
      <h5>Поля для выбранной сущности</h5>
      <div id="fields-table"></div>
      <p class="text-muted mt-2">Строка 1 — заголовки. Строка 2 — подсказки. Строка 3 — пример. Ваши данные — с 4-й строки (или удалите строки 2-3 и пишите со 2-й).</p>
    </div>
  </div>
</div>

<script>
const fields = {
  cards: [
    ['id','уникальный id','tbank_black'],
    ['bank_name','название банка','Т-Банк'],
    ['bank_color','цвет фона HEX','#FFDD2D'],
    ['bank_text_color','цвет текста HEX','#000000'],
    ['bank_abbr','аббревиатура','ТБ'],
    ['name','название карты','Т-Блэк'],
    ['card_type','debit / credit','debit'],
    ['cashback','JSON {категория: %}','{"продукты":1}'],
    ['cashback_note','примечание','До 30%'],
    ['grace_days','дней без %','0'],
    ['fee','руб/мес','0'],
    ['fee_base','руб/год','99'],
    ['conditions','через запятую','премиальный'],
    ['tags','через запятую','дебетовая'],
    ['url','ссылка','https://...'],
    ['is_active','да / нет','да'],
  ],
  deposits: [
    ['id','уникальный id','tbank_priv'],
    ['bank_name','название банка','Т-Банк'],
    ['bank_color','цвет фона HEX','#FFDD2D'],
    ['bank_text_color','цвет текста HEX','#000000'],
    ['bank_abbr','аббревиатура','ТБ'],
    ['name','название вклада','Т-Привилегия'],
    ['rates','JSON {мес: ставка}','{"3":"22.5"}'],
    ['min_amount','мин сумма руб','50000'],
    ['max_amount','макс сумма руб',''],
    ['freq','end / monthly','end'],
    ['replenishment','да / нет','нет'],
    ['withdrawal','да / нет','нет'],
    ['conditions','через запятую','премиальный'],
    ['tags','через запятую','вклад'],
    ['is_active','да / нет','да'],
  ],
  companies: [
    ['id','уникальный id','yandex'],
    ['name','название','Яндекс'],
    ['abbr','аббревиатура','Я'],
    ['color','цвет HEX','#FC3F1D'],
    ['category_id','id категории','tech'],
    ['description','описание','Технологическая компания'],
    ['promo_types','через запятую','скидка, кэшбек'],
    ['is_active','да / нет','да'],
  ],
};

function renderFields() {
  const entity = document.querySelector('[name=entity]').value;
  const rows = fields[entity];
  let html = '<table class="table table-sm table-bordered"><thead><tr><th>Колонка</th><th>Поле</th><th>Формат</th><th>Пример</th></tr></thead><tbody>';
  rows.forEach((r, i) => {
    html += `<tr><td>${String.fromCharCode(65+i)}</td><td>${r[0]}</td><td>${r[1]}</td><td><code>${r[2]}</code></td></tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('fields-table').innerHTML = html;
}

document.querySelector('[name=entity]').addEventListener('change', renderFields);
renderFields();
</script>

<script>
document.getElementById("import-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const form = e.target;
  const result = document.getElementById("result");
  result.innerHTML = '<div class="text-muted">Загрузка...</div>';

  const entity = form.entity.value;
  const fd = new FormData();
  fd.append("file", form.file.files[0]);

  const resp = await fetch(`/api/v1/admin/import/${entity}`, { method: "POST", body: fd, credentials: "include" });
  const data = await resp.json();

  if (!resp.ok) {
    result.innerHTML = `<div class="alert alert-danger">${data.detail || "Ошибка"}</div>`;
    return;
  }

  let html = `<div class="alert alert-success">Создано: ${data.created}, обновлено: ${data.updated}</div>`;
  if (data.errors && data.errors.length) {
    html += '<div class="alert alert-warning"><b>Ошибки:</b><ul class="mb-0">';
    for (const err of data.errors) {
      html += `<li>Строка ${err.row}: ${err.message}</li>`;
    }
    html += "</ul></div>";
  }
  result.innerHTML = html;
});
</script>
{% endblock %}
