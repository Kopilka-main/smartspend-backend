{% extends "layout.html" %}
{% block content %}
<div class="card">
  <div class="card-header">
    <h3 class="card-title">Импорт из Excel</h3>
  </div>
  <div class="card-body">
    <form id="import-form" enctype="multipart/form-data">
      <div class="mb-3">
        <label class="form-label">Сущность</label>
        <select name="entity" class="form-select" required>
          <option value="cards">Карты</option>
          <option value="deposits">Вклады</option>
          <option value="companies">Компании</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Файл .xlsx</label>
        <input type="file" name="file" class="form-control" accept=".xlsx" required>
      </div>
      <button type="submit" class="btn btn-primary">Загрузить</button>
    </form>
    <div id="result" class="mt-4"></div>
  </div>
</div>

<script>
document.getElementById("import-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const form = e.target;
  const result = document.getElementById("result");
  result.innerHTML = '<div class="text-muted">Загрузка...</div>';

  const entity = form.entity.value;
  const fd = new FormData();
  fd.append("file", form.file.files[0]);

  const resp = await fetch(`/api/v1/admin/import/${entity}`, { method: "POST", body: fd, credentials: "include" });
  const data = await resp.json();

  if (!resp.ok) {
    result.innerHTML = `<div class="alert alert-danger">${data.detail || "Ошибка"}</div>`;
    return;
  }

  let html = `<div class="alert alert-success">Создано: ${data.created}, обновлено: ${data.updated}</div>`;
  if (data.errors && data.errors.length) {
    html += '<div class="alert alert-warning"><b>Ошибки:</b><ul class="mb-0">';
    for (const err of data.errors) {
      html += `<li>Строка ${err.row}: ${err.message}</li>`;
    }
    html += "</ul></div>";
  }
  result.innerHTML = html;
});
</script>
{% endblock %}
