services:
  smartspend-api:
    build: .
    container_name: smartspend-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8001"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@smartspend-db:5432/${POSTGRES_DB}
    volumes:
      - smartspend_uploads:/app/uploads
    depends_on:
      smartspend-db:
        condition: service_healthy
      smartspend-migrations:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2).status == 200 else 1)"
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 15s

  smartspend-db:
    image: postgres:16-alpine
    container_name: smartspend-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - smartspend_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

  smartspend-migrations:
    build: .
    container_name: smartspend-migrations
    restart: "no"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@smartspend-db:5432/${POSTGRES_DB}
    command: python -m alembic upgrade head
    depends_on:
      smartspend-db:
        condition: service_healthy

volumes:
  smartspend_pgdata:
  smartspend_uploads:
