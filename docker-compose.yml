services:
  smartspend-api:
    build: .
    container_name: smartspend-api
    restart: always
    ports:
      - "127.0.0.1:8001:8001"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@smartspend-db:5432/${POSTGRES_DB}
    volumes:
      - smartspend_uploads:/app/uploads
    depends_on:
      smartspend-db:
        condition: service_healthy

  smartspend-db:
    image: postgres:16-alpine
    container_name: smartspend-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - smartspend_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  smartspend_pgdata:
  smartspend_uploads:
