name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: kopilka.i20h.ru
          username: goncharov
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /project/SmartSpend
            git pull origin main
            docker compose up -d --build
            docker exec smartspend-api python -m alembic upgrade head
            echo "Deploy complete: $(date)"
