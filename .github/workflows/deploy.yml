name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: kopilka.i20h.ru
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /project/smartspend/back
            git pull origin main
            docker compose up -d --build
            docker compose exec -T smartspend-api python -m alembic upgrade head
            echo "Deploy complete: $(date)"
