name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[test]" ruff
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Pytest
        run: pytest

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: kopilka.i20h.ru
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /project/smartspend/back

            PREVIOUS_SHA=$(git rev-parse HEAD)
            git fetch --prune origin main
            git reset --hard origin/main
            NEW_SHA=$(git rev-parse HEAD)
            echo "Deploying $PREVIOUS_SHA -> $NEW_SHA"

            smoke_test() {
              for attempt in 1 2 3 4 5; do
                if curl -fsS --max-time 5 http://127.0.0.1:8001/health/ready >/dev/null; then
                  echo "Smoke test OK (attempt $attempt)"
                  return 0
                fi
                sleep 2
              done
              return 1
            }

            if docker compose up -d --build --wait --wait-timeout 180 && smoke_test; then
              echo "Deploy complete: $(date), SHA=$NEW_SHA"
              exit 0
            fi

            echo "!!! Deploy FAILED on $NEW_SHA, rolling back code to $PREVIOUS_SHA" >&2
            echo "!!! WARNING: DB migrations (if any) are NOT rolled back automatically" >&2
            docker compose logs --tail=200 smartspend-migrations smartspend-api || true

            git reset --hard "$PREVIOUS_SHA"
            if docker compose up -d --build --wait --wait-timeout 180 && smoke_test; then
              echo "Rolled back to $PREVIOUS_SHA, but original deploy $NEW_SHA failed" >&2
            else
              echo "!!! Rollback ALSO failed, manual intervention required" >&2
            fi
            exit 1

  notify:
    needs: [test, deploy]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - name: Send Telegram notification
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          TEST_RESULT: ${{ needs.test.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          set -euo pipefail
          SUBJECT=$(printf '%s\n' "$COMMIT_MSG" | head -n 1 | cut -c 1-200)
          SUBJECT_ESCAPED=$(printf '%s' "$SUBJECT" | sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g')
          SHORT_SHA="${GITHUB_SHA:0:7}"

          if [ "$TEST_RESULT" = "failure" ]; then
            STATUS="🚨 <b>Tests FAILED</b> — deploy skipped"
            LINK_LABEL="Open logs"
          elif [ "$DEPLOY_RESULT" = "failure" ]; then
            STATUS="🚨 <b>Deploy FAILED</b>"
            LINK_LABEL="Open logs"
          elif [ "$TEST_RESULT" = "success" ] && [ "$DEPLOY_RESULT" = "success" ]; then
            STATUS="✅ <b>Deploy OK</b>"
            LINK_LABEL="View workflow run"
          else
            echo "Unexpected combo: test=$TEST_RESULT, deploy=$DEPLOY_RESULT — skipping notification"
            exit 0
          fi

          TEXT="${STATUS}

          <b>Repo:</b> <code>${GITHUB_REPOSITORY}</code>
          <b>Commit:</b> <a href=\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}\">${SHORT_SHA}</a> — ${SUBJECT_ESCAPED}
          <b>Author:</b> ${GITHUB_ACTOR}
          <a href=\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\">${LINK_LABEL}</a>"

          curl -sS -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${TEXT}"
