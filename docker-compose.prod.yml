name: smartspend-prod

services:
  smartspend-api:
    build: .
    container_name: prod-smartspend-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8101:8001"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@prod-smartspend-db:5432/${POSTGRES_DB}
    volumes:
      - /project/Smartspend/PROD/uploads:/app/uploads
    depends_on:
      smartspend-db:
        condition: service_healthy
      smartspend-migrations:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2).status == 200 else 1)"
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  smartspend-db:
    image: postgres:16-alpine
    container_name: prod-smartspend-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /var/lib/postgresql_smartspend_prod:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  smartspend-migrations:
    build: .
    container_name: prod-smartspend-migrations
    restart: "no"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@prod-smartspend-db:5432/${POSTGRES_DB}
    command: python -m alembic upgrade head
    depends_on:
      smartspend-db:
        condition: service_healthy
